name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SITE_URL: https://www.aisdoha.net
          NEXT_TELEMETRY_DISABLED: 1
          CI: "true"

  a11y:
    name: Accessibility audit
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          NEXT_TELEMETRY_DISABLED: 1
          CI: "true"

      - name: Start server
        run: pnpm start &
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000/en --timeout 60000

      - name: Run axe-core
        run: pnpm a11y

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod
