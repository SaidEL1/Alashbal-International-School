services:
  db:
    image: postgres:16-alpine
    container_name: ais-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ais
      POSTGRES_PASSWORD: ais_dev_password
      POSTGRES_DB: alashbal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ais -d alashbal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
