[build]
  command = "pnpm db:generate && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # Required for Prisma client generation at build time (no DB connection needed)
  DATABASE_URL = "postgresql://build:build@localhost:5432/build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Locale routing: redirect root to default locale
[[redirects]]
  from = "/"
  to = "/en"
  status = 302
